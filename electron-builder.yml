appId: com.stockflow.desktop
productName: StockFlow
copyright: Copyright 2026 StockFlow

directories:
  output: release

files:
  - out/**
  - package.json

extraResources:
  - from: public/icon.png
    to: icon.png

win:
  target: nsis
  icon: public/icon.png
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.png
  shortcutName: StockFlow

mac:
  target: dmg
  icon: public/icon.png

linux:
  target: AppImage
  icon: public/icon.png
