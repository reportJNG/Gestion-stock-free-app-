appId: com.stockflow.desktop
productName: StockFlow
copyright: Copyright 2026 StockFlow

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

extraResources:
  - from: public/icon.png
    to: icon.png

asar: true

# Auto-update is intentionally disabled until a publish provider is configured.
publish: null

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: public/icon.png
  requestedExecutionLevel: asInvoker
  artifactName: ${productName}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  shortcutName: StockFlow
  artifactName: ${productName} Setup.${ext}
  uninstallDisplayName: StockFlow
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true

mac:
  target: dmg
  icon: public/icon.png

linux:
  target: AppImage
  icon: public/icon.png
